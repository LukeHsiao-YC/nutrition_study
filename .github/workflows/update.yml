name: 每日自動更新文獻

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得專案原始碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝所需套件
        run: pip install feedparser google-genai

      - name: 執行 AI 抓取腳本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: 把新產生的 Markdown 存回 GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動新增最新期刊重點整理" && git push)
